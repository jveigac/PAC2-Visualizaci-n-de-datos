<!DOCTYPE html>
<html>
<head>
    <title>Tableau Visualization</title>
</head>
<body>
    <div class='tableauPlaceholder' style='position: relative;'>
        <object class='tableauViz' width='100%' height='600' style='display:none;'>
            <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' />
            <param name='path' value='views/MyTableauViz/Sheet1?:embed=y&:display_count=yes' />
            <param name='toolbar' value='yes' />
            <param name='site_root' value='' />
        </object>
    </div>
    <script type='text/javascript'>
        var divElement = document.getElementsByClassName('tableauPlaceholder')[0];
        var vizElement = divElement.getElementsByTagName('object')[0];
        vizElement.style.width = divElement.offsetWidth + 'px';
        vizElement.style.height = divElement.offsetHeight + 'px';
        var scriptElement = document.createElement('script');
        scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
        vizElement.parentNode.insertBefore(scriptElement, vizElement);
    </script>
</body>
</html>
